apiVersion: apps/v1
kind: Deployment
metadata:
  name: qaops-frontend
  labels:
    app: qaops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qaops-frontend
  template:
    metadata:
      labels:
        app: qaops-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/qaops-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://qaops-api-gateway"
---
apiVersion: v1
kind: Service
metadata:
  name: qaops-frontend
spec:
  selector:
    app: qaops-frontend
  ports:
    - port: 80
      targetPort: 3000
