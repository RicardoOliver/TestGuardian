apiVersion: apps/v1
kind: Deployment
metadata:
  name: qaops-backend
  labels:
    app: qaops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qaops-backend
  template:
    metadata:
      labels:
        app: qaops-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/qaops-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: qaops-backend
spec:
  selector:
    app: qaops-backend
  ports:
    - port: 80
      targetPort: 4000
      protocol: TCP
